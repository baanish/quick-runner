[general]
default_run_mode = "output"

[projects]
roots = ["~/Development"]
scan_depth = 2
scan_interval_hours = 1

[ai]
protocol = "openai"
base_url = "https://api.openai.com/v1"
model = ""
api_key = ""
api_key_env = "OPENAI_API_KEY"

[ai.fallback]
protocol = "openai"
base_url = "https://api.openai.com/v1"
model = ""
api_key = ""
api_key_env = "OPENAI_API_KEY"

[stats]
enabled = false
db_path = "__default__"

[do.agents]
codex = "codex exec"
claude = "claude --dangerously-skip-permissions -p"
